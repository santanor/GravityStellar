name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6"
  DOTNET_VERSION: "8.0.x"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run GdUnit4 C# Tests
        uses: MikeSchulze/gdUnit4-action@v1
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          godot-status: "stable"
          godot-net: true
          version: "installed"
          paths: "res://test"
          timeout: 10
          retries: 0
          report-name: "test-results"

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/

  build:
    name: Build Windows Export
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache Godot Export Templates
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot
            ~/.config/godot
          key: godot-${{ env.GODOT_VERSION }}-export-templates
          restore-keys: |
            godot-${{ env.GODOT_VERSION }}-

      - name: Export Windows Build
        id: export
        continue-on-error: true
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: false
          cache: true
          verbose: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect Export Output
        shell: bash
        run: |
          echo "=== Searching for exported files ==="

          # Debug: show what's in godot's directories
          echo "--- Godot directories ---"
          ls -la "$HOME/.local/share/godot/" 2>/dev/null || echo "No ~/.local/share/godot/"
          ls -la "$HOME/.local/share/godot/builds/" 2>/dev/null || echo "No builds/ directory"
          ls -laR "$HOME/.local/share/godot/builds/" 2>/dev/null || echo "No builds/ contents"

          # Debug: check the workspace too
          echo "--- Workspace build directories ---"
          ls -la build/ 2>/dev/null || echo "No build/ in workspace"
          ls -laR build/ 2>/dev/null || echo "No build/ contents"

          # Search for the exe in common locations
          echo "--- Searching for GravityStellar.exe ---"
          EXE_PATH=""
          for search_dir in \
            "$HOME/.local/share/godot/builds" \
            "$HOME/.local/share/godot" \
            "/tmp" \
            "."; do
            if [ -d "$search_dir" ]; then
              FOUND=$(find "$search_dir" -name "GravityStellar.exe" -type f 2>/dev/null | head -1) || true
              if [ -n "$FOUND" ]; then
                EXE_PATH="$FOUND"
                echo "Found exe at: $EXE_PATH"
                break
              fi
            fi
          done

          # Broader search if still not found
          if [ -z "$EXE_PATH" ]; then
            echo "Not found in common locations, searching entire filesystem..."
            EXE_PATH=$(find / -name "GravityStellar.exe" -type f 2>/dev/null | head -1) || true
          fi

          if [ -z "$EXE_PATH" ]; then
            echo "ERROR: GravityStellar.exe not found anywhere on the filesystem"
            echo "--- Full /home/runner/.local/share/godot/ tree ---"
            find "$HOME/.local/share/godot/" -type f 2>/dev/null | head -100 || true
            exit 1
          fi

          echo "Found exe at: $EXE_PATH"
          EXE_DIR=$(dirname "$EXE_PATH")
          echo "Export directory: $EXE_DIR"
          echo "Contents:"
          ls -la "$EXE_DIR/" 2>/dev/null || true

          # Copy all exported files to build/windows/
          mkdir -p build/windows
          cp -v "$EXE_DIR"/* build/windows/ 2>/dev/null || true

          # Copy .NET assemblies subdirectory if it exists
          for subdir in "$EXE_DIR"/*/; do
            if [ -d "$subdir" ]; then
              cp -rv "$subdir" build/windows/ 2>/dev/null || true
            fi
          done

          echo ""
          echo "=== Collected files in build/windows/ ==="
          ls -la build/windows/ 2>/dev/null || echo "build/windows/ is empty!"
          find build/windows/ -type f 2>/dev/null | head -50 || true

      - name: Verify Export Success
        shell: bash
        run: |
          if [ ! -f "build/windows/GravityStellar.exe" ]; then
            echo "ERROR: Export failed - GravityStellar.exe not found at build/windows/"
            echo "Listing build/ contents for debugging:"
            find build/ -type f 2>/dev/null || echo "build/ directory does not exist"
            exit 1
          fi
          if [ ! -f "build/windows/GravityStellar.pck" ]; then
            echo "WARNING: GravityStellar.pck not found (may be embedded in exe)"
          fi
          echo "Export verification passed"
          ls -la build/windows/

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.event.pull_request.number }}
          path: build/windows/
          retention-days: 14
          if-no-files-found: error
