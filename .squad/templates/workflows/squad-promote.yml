name: Squad Promote

on:
  workflow_dispatch:
    inputs:
      feature_branch:
        description: 'Feature branch to promote to master (e.g. feature/my-feature)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — show what would happen without pushing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  feature-to-master:
    name: Promote feature → master
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Validate branch name
        env:
          BRANCH: ${{ inputs.feature_branch }}
        run: |
          if ! echo "$BRANCH" | grep -qE '^feature/[a-zA-Z0-9_-]+(/[a-zA-Z0-9_-]+)*$'; then
            echo "::error::Invalid branch name '$BRANCH'. Must match 'feature/<alphanumeric-hyphen-slash>'."
            exit 1
          fi
          echo "✅ Branch name is valid: $BRANCH"

      - name: Show current state (dry run info)
        env:
          BRANCH: ${{ inputs.feature_branch }}
        run: |
          echo "=== $BRANCH HEAD ===" && git log "origin/$BRANCH" -1 --oneline
          echo "=== master HEAD ===" && git log origin/master -1 --oneline
          echo "=== Files that would be merged ==="
          git diff "origin/master".."origin/$BRANCH" --name-only || echo "(none)"

      - name: Merge feature → master
        if: ${{ inputs.dry_run == 'false' }}
        env:
          BRANCH: ${{ inputs.feature_branch }}
        run: |
          git checkout master
          git merge "origin/$BRANCH" --no-ff -m "chore: promote $BRANCH → master"
          git push origin master
          echo "✅ Pushed master — squad-release.yml will tag and publish the release"

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."
